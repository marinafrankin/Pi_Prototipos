<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/cadastro.css">
    
</head>

<body>
        <div class="body2">
            <header>
                <nav>
                    <a class="logo"href="/">Sebastian Cabelo e Estética</a>

                    <div class="mobile-menu">
                        <div class="line1"></div>
                        <div class="line2"></div>
                        <div class="line3"></div>
                    </div>

                    <ul class="nav-list">
                        <li><a href="/home/index.html">Home</a></li>
                        <li><a href="/servicos/index.html">Serviços</a></li>
                        <li><a href="/agenda/index.html">Agenda</a></li>
                        <li><a href="/login/index.html">Login</a></li>
                    </ul>
                </nav>
            </header>
        </div>

    <div class="body1">
        <div class="container">
            <div class="form-image">
                <img src="/img/undraw_barber_utly.svg" alt="backgraund de salão">
            </div>

            <div class="form">
                <form action="#">
                    <div class="form-header">

                        <div class="title">
                            <h1>Cadastre-se</h1>
                        </div>

                        <div class="login-button">
                            <button><a href="#" type="button">Entrar</a></button>
                        </div>

                    </div>

                    <div class="input-group">
                        <div class="input-box">
                            <label for="firstname">Nome:</label>
                            <input id="firstname" type="text" name="firstname" placeholder="Digite seu nome" required>
                        </div>

                        <div class="input-box">
                            <label for="lastname">Sobrenome:</label>
                            <input id="lastname" type="text" name="lastname" placeholder="Digite seu sobrenome" required>
                        </div>

                        <div class="input-box">
                            <label for="email">E-mail:</label>
                            <input id="email" type="email" name="email" placeholder="Digite seu email" required>
                        </div>

                        <div class="input-box">
                            <label for="number">Telefone (celular):</label>
                            <input id="number" type="tel" name="number" placeholder="(xx) xxxxx-xxxx" required>
                        </div>

                        <div class="input-box">
                            <label for="password">Senha:</label>
                            <input id="password" type="password" name="password" placeholder="Digite uma senha" required>
                        </div>

                        <div class="input-box">
                            <label for="confirmPassword">Confirmar senha:</label>
                            <input id="confirmPassword" type="password" name="confirmPassword" placeholder="Digite novamente a senha" required>
                        </div>
                    </div>

                    <div class="continue-button">
                        <button><a href="#">Continuar</a></button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/mobile-navbar.js"></script>

</body>
</html>
